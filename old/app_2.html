<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 LED Pro Controller</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background: #0f0f0f; color: #e0e0e0; padding: 20px; }
        .card { background: #1a1a1a; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); width: 320px; text-align: center; border: 1px solid #333; }
        
        .color-well { width: 100%; height: 120px; border: none; border-radius: 12px; cursor: pointer; background: none; margin-bottom: 20px; }
        
        .control-group { margin-bottom: 25px; text-align: left; }
        label { display: block; margin-bottom: 10px; font-size: 0.9rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        
        input[type="range"] { width: 100%; height: 8px; border-radius: 5px; background: #333; accent-color: #00e676; cursor: pointer; }
        
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 700; transition: all 0.2s; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-connect { background: linear-gradient(135deg, #00e676, #00c853); color: #000; }
        .btn-connect:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,230,118,0.4); }
        .btn-connect:disabled { background: #333; color: #777; transform: none; box-shadow: none; }

        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #ff5252; margin-right: 8px; }
        .connected .status-dot { background: #00e676; box-shadow: 0 0 10px #00e676; }
        
        .value-label { float: right; font-family: monospace; color: #00e676; }
    </style>
</head>
<body>

    <div id="connectionStatus">
        <span class="status-dot"></span><span id="statusText">Disconnected</span>
    </div>
    <h2 style="margin-top: 10px;">LED Controller</h2>

    <button id="connectBtn" class="btn-connect">CONNECT SERIAL</button>

    <div class="card">
        <div class="control-group">
            <label>Color Picker (RGB)</label>
            <input type="color" id="colorPicker" class="color-well" value="#00e676">
        </div>

        <div class="control-group">
            <label>White Channel <span id="wVal" class="value-label">0</span></label>
            <input type="range" id="whiteSlider" min="0" max="1023" value="0">
        </div>

        <div style="font-size: 0.7rem; color: #555;">PROTOCOL: R:G:B:W</div>
    </div>

    <script>
        let port;
        let writer;
        const maxPwm = 1023; // Matches your ESP32 #define

        const connectBtn = document.getElementById('connectBtn');
        const colorPicker = document.getElementById('colorPicker');
        const whiteSlider = document.getElementById('whiteSlider');
        const wValDisplay = document.getElementById('wVal');
        const statusContainer = document.getElementById('connectionStatus');
        const statusText = document.getElementById('statusText');

        // Helper: Convert Hex (#ffffff) to RGB Object
        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            // Scale 0-255 (Hex) to 0-1023 (ESP32 PWM)
            return {
                r: Math.round((r / 255) * maxPwm),
                g: Math.round((g / 255) * maxPwm),
                b: Math.round((b / 255) * maxPwm)
            };
        }

        async function sendToEsp() {
            if (!writer) return;

            const rgb = hexToRgb(colorPicker.value);
            const w = whiteSlider.value;
            const payload = `${rgb.r}:${rgb.g}:${rgb.b}:${w}\n`;

            try {
                await writer.write(new TextEncoder().encode(payload));
            } catch (err) {
                console.error("Write error:", err);
            }
        }

        // Listeners
        colorPicker.addEventListener('input', sendToEsp);
        whiteSlider.addEventListener('input', () => {
            wValDisplay.innerText = whiteSlider.value;
            sendToEsp();
        });

        connectBtn.addEventListener('click', async () => {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                writer = port.writable.getWriter();
                
                statusContainer.classList.add('connected');
                statusText.innerText = "Connected to ESP32";
                connectBtn.disabled = true;
                connectBtn.innerText = "LINK ACTIVE";
            } catch (err) {
                console.error("Connection failed", err);
            }
        });
    </script>
</body>
</html>
