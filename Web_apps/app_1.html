<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 LED Controller</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; color: white; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 300px; }
        .control { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="range"] { width: 100%; cursor: pointer; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-connect { background: #00e676; color: #000; margin-bottom: 20px; }
        .btn-connect:disabled { background: #555; color: #888; }
        .value-display { text-align: center; font-family: monospace; color: #00e676; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>LED Driver Control</h1>

    <button id="connectBtn" class="btn-connect">Connect to ESP32</button>

    <div class="card">
        <div class="control">
            <label style="color: #ff5252;">Red</label>
            <input type="range" id="r" min="0" max="1023" value="0">
            <div id="v-r" class="value-display">0</div>
        </div>

        <div class="control">
            <label style="color: #69f0ae;">Green</label>
            <input type="range" id="g" min="0" max="1023" value="0">
            <div id="v-g" class="value-display">0</div>
        </div>

        <div class="control">
            <label style="color: #448aff;">Blue</label>
            <input type="range" id="b" min="0" max="1023" value="0">
            <div id="v-b" class="value-display">0</div>
        </div>

        <div class="control">
            <label style="color: #ffffff;">White</label>
            <input type="range" id="w" min="0" max="1023" value="0">
            <div id="v-w" class="value-display">0</div>
        </div>
    </div>

    <script>
        let port;
        let writer;

        const connectBtn = document.getElementById('connectBtn');
        const sliders = ['r', 'g', 'b', 'w'];

        // Function to send data to ESP32
        async function sendValues() {
            if (!writer) return;

            const r = document.getElementById('r').value;
            const g = document.getElementById('g').value;
            const b = document.getElementById('b').value;
            const w = document.getElementById('w').value;

            const data = `${r}:${g}:${b}:${w}\n`;
            
            try {
                await writer.write(new TextEncoder().encode(data));
                console.log("Sent:", data);
            } catch (error) {
                console.error("Write error:", error);
            }
        }

        // Update UI and trigger send
        sliders.forEach(id => {
            const el = document.getElementById(id);
            const valDisplay = document.getElementById(`v-${id}`);
            
            el.addEventListener('input', () => {
                valDisplay.innerText = el.value;
                sendValues(); // Real-time update
            });
        });

        // Web Serial Connection Logic
        connectBtn.addEventListener('click', async () => {
            try {
                // Request a port and open a connection.
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });

                writer = port.writable.getWriter();
                
                connectBtn.innerText = "Connected";
                connectBtn.disabled = true;
                connectBtn.style.background = "#333";
            } catch (err) {
                console.error('Connection failed:', err);
                alert('Connection failed. Check console for details.');
            }
        });
    </script>
</body>
</html>
