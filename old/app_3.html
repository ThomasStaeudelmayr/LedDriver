<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ESP32 HSL Controller</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 20px; width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        canvas { border-radius: 50%; cursor: crosshair; margin: 20px 0; border: 4px solid #333; }
        
        .slider-group { margin: 15px 0; text-align: left; }
        label { display: block; font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        input[type="range"] { width: 100%; accent-color: #00e676; }
        
        button { background: #00e676; color: black; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 15px; }
        .val-preview { font-family: monospace; color: #00e676; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <button id="connectBtn">CONNECT TO ESP32</button>

    <div class="card">
        <canvas id="colorWheel" width="250" height="250"></canvas>
        
        <div class="slider-group">
            <label>Saturation (Vibrancy)</label>
            <input type="range" id="sat" min="0" max="100" value="100">
        </div>

        <div class="slider-group">
            <label>Luminance (Brightness)</label>
            <input type="range" id="lum" min="0" max="100" value="50">
        </div>

        <div class="slider-group">
            <label>Dedicated White Channel</label>
            <input type="range" id="white" min="0" max="1023" value="0">
        </div>

        <div id="debug" class="val-preview">R:0 G:0 B:0 W:0</div>
    </div>

    <script>
        let port, writer;
        let currentHue = 0;
        const canvas = document.getElementById('colorWheel');
        const ctx = canvas.getContext('2d');
        const radius = canvas.width / 2;

        // Draw the 360 Degree Color Wheel
        function drawWheel() {
            for (let angle = 0; angle < 360; angle++) {
                let startAngle = (angle - 1) * Math.PI / 180;
                let endAngle = (angle + 1) * Math.PI / 180;
                ctx.beginPath();
                ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = `hsl(${angle}, 100%, 50%)`;
                ctx.fill();
            }
        }
        drawWheel();

        // Convert HSL to RGB (0-1023 scale)
        function hslToRgb(h, s, l) {
            s /= 100; l /= 100;
            const k = n => (n + h / 30) % 12;
            const a = s * Math.min(l, 1 - l);
            const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
            return {
                r: Math.round(f(0) * 1023),
                g: Math.round(f(8) * 1023),
                b: Math.round(f(4) * 1023)
            };
        }

        async function updateAndSend() {
            const s = document.getElementById('sat').value;
            const l = document.getElementById('lum').value;
            const w = document.getElementById('white').value;
            
            const rgb = hslToRgb(currentHue, s, l);
            const payload = `${rgb.r}:${rgb.g}:${rgb.b}:${w}\n`;
            
            document.getElementById('debug').innerText = payload.trim();

            if (writer) {
                try {
                    await writer.write(new TextEncoder().encode(payload));
                } catch (e) { console.error(e); }
            }
        }

        // Handle Wheel Clicks/Touches
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left - radius;
            const y = e.clientY - rect.top - radius;
            currentHue = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
            updateAndSend();
        });

        document.getElementById('sat').addEventListener('input', updateAndSend);
        document.getElementById('lum').addEventListener('input', updateAndSend);
        document.getElementById('white').addEventListener('input', updateAndSend);

        // Connection
        document.getElementById('connectBtn').addEventListener('click', async () => {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            writer = port.writable.getWriter();
            document.getElementById('connectBtn').innerText = "CONNECTED";
        });
    </script>
</body>
</html>
